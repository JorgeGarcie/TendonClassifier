# Sparsh temporal tokenization — Image only (no force)
# 6-channel input: img_t (subtracted) + img_{t-stride} (subtracted) → Sparsh ViT → classifier

experiment:
  name: "sparsh_temporal_image_only"
  project: "TendonClassifier"
  seed: 42

model:
  type: "spatial"
  encoder:
    name: "sparsh_vitb16"
    pretrained: true
    freeze: true
  fusion:
    type: "token_self_attention"
    hidden_dim: 128
    num_heads: 4
    num_layers: 1
    dropout: 0.1
  num_classes: 4
  use_force: false
  use_depth_head: false

data:
  manifest: "../labeling/output/gt_dataset/gt_manifest.csv"
  img_size: 224
  include_run_regex: "traverse|p1_t_0_str"
  sparsh_temporal_stride: 3
  normalization:
    type: "none"
  subtraction:
    enabled: true
    reference: "first_frame"
    type: "sparsh"
  augmentation:
    enabled: false

training:
  epochs: 40
  batch_size: 16
  lr: 4.36e-5
  weight_decay: 3.33e-4
  optimizer: "adam"
  scheduler:
    type: "cosine"
    warmup_epochs: 5
  loss:
    class_weights: "balanced"
    depth_weight: 0.1
  val_ratio: 0.1
  split_by: "frame"
  split:
    test_ratio: 0.1

checkpoint:
  dir: "checkpoints"
  save_best: true
  save_last: true
  save_every_n_epochs: 5

logging:
  wandb:
    enabled: true
    tags: ["sparsh", "temporal_tokenization", "image_only", "6ch"]
  csv:
    enabled: true
  print_every: 1
