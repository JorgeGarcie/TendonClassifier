# Ablation: Image-only with sweep winner hyperparameters
# Matches true-sweep-2 (xwrzqhgu) except use_force=false

experiment:
  name: "ablation_image_only"
  project: "TendonClassifier"
  seed: 42

model:
  type: "spatial"
  encoder:
    name: "resnet18"
    pretrained: true
    freeze: true
  fusion:
    type: "token_self_attention"
    hidden_dim: 128
    num_heads: 4
    num_layers: 1
    dropout: 0.1
  num_classes: 4
  use_force: false
  use_depth_head: false

data:
  manifest: "../labeling/output/gt_dataset/gt_manifest.csv"
  img_size: 224
  include_run_regex: "traverse"
  normalization:
    type: "imagenet"
  subtraction:
    enabled: true
    reference: "first_frame"
  augmentation:
    enabled: false

training:
  epochs: 40
  batch_size: 16
  lr: 4.36e-05
  weight_decay: 3.33e-04
  optimizer: "adam"
  scheduler:
    type: "cosine"
    warmup_epochs: 5
  loss:
    class_weights: "balanced"
    depth_weight: 0.1
  val_ratio: 0.1
  split_by: "frame"
  split:
    test_ratio: 0.1

checkpoint:
  dir: "checkpoints"
  save_best: true
  save_last: true
  save_every_n_epochs: 0

logging:
  wandb:
    enabled: true
    tags: ["ablation", "image_only", "subtraction", "sweep_hp"]
  csv:
    enabled: true
  print_every: 5
