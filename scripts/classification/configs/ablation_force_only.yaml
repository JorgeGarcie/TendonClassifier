# Ablation: Force-only with sweep winner hyperparameters
# Matches true-sweep-2 (xwrzqhgu) except type=spatial_force

experiment:
  name: "ablation_force_only"
  project: "TendonClassifier"
  seed: 42

model:
  type: "spatial_force"
  num_classes: 4
  use_force: true
  use_depth_head: false

data:
  manifest: "../labeling/output/gt_dataset/gt_manifest.csv"
  img_size: 224
  include_run_regex: "traverse"
  normalization:
    type: "imagenet"
  subtraction:
    enabled: false
  augmentation:
    enabled: false

training:
  epochs: 40
  batch_size: 16
  lr: 4.36e-05
  weight_decay: 3.33e-04
  optimizer: "adam"
  scheduler:
    type: "cosine"
    warmup_epochs: 5
  loss:
    class_weights: "balanced"
    depth_weight: 0.1
  val_ratio: 0.1
  split_by: "frame"
  split:
    test_ratio: 0.1

checkpoint:
  dir: "checkpoints"
  save_best: true
  save_last: true
  save_every_n_epochs: 0

logging:
  wandb:
    enabled: true
    tags: ["ablation", "force_only", "sweep_hp"]
  csv:
    enabled: true
  print_every: 5
