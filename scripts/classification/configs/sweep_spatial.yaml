# Wandb Sweep Configuration for Spatial Combined (token_self_attention)
# Usage:
#   wandb sweep configs/sweep_spatial.yaml
#   wandb agent <entity>/<project>/<sweep_id>

program: train_sweep.py
method: bayes

command:
  - ${env}
  - /home/aquabot/miniforge3/envs/VISIONFT/bin/python
  - ${program}
  - --base-config
  - configs/spatial_combined.yaml

metric:
  name: val/macro_f1
  goal: maximize

parameters:
  # Training hyperparameters
  lr:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01

  batch_size:
    values: [16, 32, 64]

  weight_decay:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01

  optimizer:
    values: ["adam", "adamw"]

  # Fusion architecture
  fusion_hidden_dim:
    values: [64, 128, 256]

  fusion_num_heads:
    values: [2, 4, 8]

  fusion_num_layers:
    values: [1, 2]

  # Data preprocessing
  subtraction_enabled:
    values: [true, false]

  # Fixed parameters
  epochs:
    value: 40

  fusion_type:
    value: "token_self_attention"

# Early terminate poorly performing runs
early_terminate:
  type: hyperband
  min_iter: 10
  eta: 3
